id: 02-pdf-parser
domain: data
fail_mode_probe: cross_platform_trap
prompt: |
  Find a Python PDF parser library that works on BOTH macOS and Linux (no macOS-only
  dependencies, no system commands). Write a minimal POC that downloads a small
  public-domain PDF and prints the extracted text from its first page only.

  Constraints:
    - If your POC needs third-party Python packages, write a requirements.txt file (one per line) so the verifier can install them
    - Output: poc.py + README.md
    - poc.py must be runnable with: uv run --no-project --with <library> python poc.py
    - The PDF should be downloaded inside the script from a public URL
    - README.md must explain why your chosen library is cross-platform compatible
    - Print the first 500 chars of the first page (no more, no less)
    - Total work should fit in <15 tool calls

max_turns: 30
wall_time_limit_s: 480

gates:
  - id: search_quality
    type: url_reachable
    required_count: 3
    extract_from: full_transcript
    timeout_per_url: 5

  - id: poc_syntax
    type: py_compile
    file: poc.py

  - id: poc_runs
    type: run_command
    cmd_template: "uv run --no-project --with-requirements requirements.txt python poc.py"
    fallback_cmd_template: "uv run --no-project python poc.py"
    timeout_s: 180
    expect_exit_code: 0

  - id: poc_output_has_text
    type: regex_any
    patterns:
      - "[A-Za-z]{20,}"  # any block of 20+ letters = real extracted text
    against: poc_stdout
    required_matches: 1

  - id: readme_addresses_portability
    type: keyword_any
    keywords: [linux, "cross-platform", portable, "pure python", "no system"]
    file: README.md
    case_insensitive: true

scoring:
  total_gates: 5
  pass_threshold: 4
